services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestao-cdi-app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      # Persistir o banco de dados SQLite mesmo que o container seja deletado
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
      # Persistir as fotos enviadas
      - ./storage/app/public:/var/www/html/storage/app/public
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - cdi-network

networks:
  cdi-network:
    driver: bridge
